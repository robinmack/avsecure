<svg width="800" height="460" viewBox="0 100 800 360" xmlns="http://www.w3.org/2000/svg">
  <rect x="0" y="100" width="800" height="360" fill="#022f33"/>

  <!-- Bridge icon -->
  <g stroke="#c87f3a" stroke-width="6" fill="none" stroke-linecap="round">
    <!-- arch -->
    <path d="M180 280 Q400 140 620 280" stroke-width="6"/>
    <!-- deck -->
    <line x1="150" y1="280" x2="650" y2="280" stroke-width="6" stroke-linecap="butt"/>
    <!-- chasm edges -->
    <line x1="135" y1="250" x2="165" y2="310" stroke-width="6"/>
    <line x1="665" y1="250" x2="635" y2="310" stroke-width="6"/>
    <!-- suspension lines -->
    <line x1="280" y1="280" x2="280" y2="231" stroke-width="6"/>
    <line x1="340" y1="280" x2="340" y2="215" stroke-width="6"/>
    <line x1="400" y1="280" x2="400" y2="210" stroke-width="6"/>
    <line x1="460" y1="280" x2="460" y2="215" stroke-width="6"/>
    <line x1="520" y1="280" x2="520" y2="231" stroke-width="6"/>
  </g>

  <!-- Wordmark -->
  <text x="400" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="54" font-weight="700" fill="#c87f3a" text-anchor="middle" letter-spacing="2">
    MACKLEPENNY
  </text>
  <text x="400" y="415" font-family="Georgia, 'Times New Roman', serif" font-size="32" font-weight="600" fill="#c87f3a" text-anchor="middle" letter-spacing="6">
    MOVEMENT
  </text>

  <!-- Motto -->
  <text x="400" y="450" font-family="Georgia, serif" font-size="18" font-style="italic" fill="#c87f3a" text-anchor="middle" letter-spacing="1">
    Building bridges together
  </text>
</svg>
